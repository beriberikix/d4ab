<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>D4AB Hardware Bridge</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --ink: #102238;
      --muted: #5a677a;
      --panel: #ffffff;
      --line: #d7deea;
      --accent: #0d6e63;
      --warn: #ef5c28;
    }

    body {
      margin: 0;
      min-width: 290px;
      padding: 12px;
      background:
        radial-gradient(30rem 20rem at 95% 0%, #ffe7d9 0%, rgba(255, 231, 217, 0) 60%),
        radial-gradient(24rem 18rem at 0% 0%, #d9f4ef 0%, rgba(217, 244, 239, 0) 56%),
        var(--bg);
      color: var(--ink);
      font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(23, 40, 67, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 16px;
    }

    p {
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }

    .badge {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      background: #e9eef8;
      color: #2d3f5d;
    }

    .ok {
      background: #ddf6e8;
      color: #135d31;
    }

    .err {
      background: #ffe7e7;
      color: #9d2222;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 8px 10px;
      margin-top: 8px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
    }

    .btn.alt {
      background: var(--warn);
    }
  </style>
</head>

<body>
  <section class="panel">
    <h1>D4AB Hardware Bridge</h1>
    <p>Open native-like chooser and diagnostics surfaces for USB, Serial, and Bluetooth.</p>

    <div class="row">
      <span id="bridgeBadge" class="badge">Bridge: checking...</span>
      <span id="permissionBadge" class="badge">Permissions: 0</span>
    </div>

    <button id="openCenterButton" class="btn">Open Device Center</button>
    <button id="openDebugButton" class="btn alt">Open Debug Console</button>
  </section>

  <script src="popup.js" defer></script>
</body>

</html>
