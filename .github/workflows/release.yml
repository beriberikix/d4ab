name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  D4AB_AUDIT_LEVEL: critical

jobs:
  version-consistency:
    name: Validate Release Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag version against package manifests
        shell: bash
        run: |
          set -euo pipefail

          release_version="${GITHUB_REF_NAME#v}"
          release_base_version="${release_version%%-*}"
          backend_version="$(node -p "require('./backend/package.json').version")"
          frontend_version="$(node -p "require('./frontend/package.json').version")"

          if [[ "${backend_version}" != "${release_base_version}" ]]; then
            echo "backend/package.json version (${backend_version}) does not match base tag version (${release_base_version}) from ${release_version}."
            exit 1
          fi

          if [[ "${frontend_version}" != "${release_base_version}" ]]; then
            echo "frontend/package.json version (${frontend_version}) does not match base tag version (${release_base_version}) from ${release_version}."
            exit 1
          fi

          echo "Version check passed for tag v${release_version} (base version ${release_base_version})."

  backend-tests:
    name: Backend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18.x
          - 20.x
    needs:
      - version-consistency
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level="${D4AB_AUDIT_LEVEL}"

      - name: Run CI-safe tests
        run: npm run test:ci

  frontend-tests:
    name: Frontend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18.x
          - 20.x
    needs:
      - version-consistency
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level="${D4AB_AUDIT_LEVEL}"

      - name: Run CI-safe tests
        run: npm run test:ci

  build-platform-installers:
    name: Build Platform Installer (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        arch:
          - x64
          - arm64
    needs:
      - version-consistency
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Windows packaging toolchain
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: choco install nsis innosetup -y --no-progress

      - name: Build installer for host platform
        run: node installer/build_installer.js --arch ${{ matrix.arch }}

      - name: Verify Windows installer binary
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path dist -Recurse -File |
            Where-Object { $_.Name -match '^d4ab-bridge-.*-windows-(x64|arm64)-(installer|inno)\.exe$' } |
            Select-Object -First 1

          if (-not $installer) {
            throw 'No Windows installer executable was produced. Winget publish flow requires d4ab-bridge-<version>-windows-<arch>-(installer|inno).exe.'
          }

          Write-Host "Found Windows installer: $($installer.FullName)"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/**
          if-no-files-found: error

  build-brew-artifacts:
    name: Build Homebrew Artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    needs:
      - version-consistency
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Build Homebrew artifacts
        run: node installer/build_installer.js --target brew

      - name: Upload Homebrew artifacts
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-${{ matrix.os }}
          path: dist/homebrew/**
          if-no-files-found: error

  build-extension-packages:
    name: Build Extension Packages
    runs-on: ubuntu-latest
    needs:
      - version-consistency
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Package browser extensions
        run: npm run package:all

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extensions
          path: frontend/dist/extensions/*
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
      - build-platform-installers
      - build-brew-artifacts
      - build-extension-packages
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Bundle artifacts for release upload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-bundles
          : > release-bundles/windows-installers-index.txt

          bundle_count=0
          for artifact_dir in release-artifacts/*; do
            if [[ -d "${artifact_dir}" ]]; then
              bundle_name="$(basename "${artifact_dir}")"

              # Keep Windows installer payload as zip for native Windows tooling expectations.
              if [[ "${bundle_name}" == installer-windows-latest-* ]]; then
                if ! command -v zip >/dev/null 2>&1; then
                  echo "zip command is required to package Windows installer artifacts."
                  exit 1
                fi
                (
                  cd release-artifacts
                  zip -r "../release-bundles/${bundle_name}.zip" "${bundle_name}"
                )

                # Publish direct installer binaries for winget manifests.
                win_installer_path="$(find "${artifact_dir}" -type f -name '*-windows-*-installer.exe' | sort | head -n1 || true)"
                installer_type="nullsoft"

                if [[ -z "${win_installer_path}" ]]; then
                  win_installer_path="$(find "${artifact_dir}" -type f -name '*-windows-*-inno.exe' | sort | head -n1 || true)"
                  installer_type="inno"
                fi

                if [[ -z "${win_installer_path}" ]]; then
                  echo "No Windows installer executable was found in downloaded artifacts."
                  exit 1
                fi

                win_installer_name="$(basename "${win_installer_path}")"
                if [[ "${win_installer_name}" =~ -windows-(x64|arm64)- ]]; then
                  installer_arch="${BASH_REMATCH[1]}"
                else
                  echo "Could not determine installer architecture from ${win_installer_name}."
                  exit 1
                fi

                cp "${win_installer_path}" "release-bundles/${win_installer_name}"
                echo "${installer_arch}|${installer_type}|${win_installer_name}" >> release-bundles/windows-installers-index.txt
              elif [[ "${bundle_name}" == "extensions" ]]; then
                ext_count=0
                while IFS= read -r -d '' extension_file; do
                  cp "${extension_file}" release-bundles/
                  ext_count=$((ext_count + 1))
                done < <(find "${artifact_dir}" -maxdepth 1 -type f \( -name '*.zip' -o -name '*.xpi' \) -print0)

                if [[ "${ext_count}" -eq 0 ]]; then
                  echo "No extension package artifacts were found in ${bundle_name}."
                  exit 1
                fi
              else
                tar -czf "release-bundles/${bundle_name}.tar.gz" -C release-artifacts "${bundle_name}"
              fi

              bundle_count=$((bundle_count + 1))
            fi
          done

          if [[ "${bundle_count}" -eq 0 ]]; then
            echo "No artifact directories were downloaded; cannot create release bundles."
            exit 1
          fi

          if [[ ! -s release-bundles/windows-installers-index.txt ]]; then
            echo "No Windows installer metadata was captured for winget generation."
            exit 1
          fi

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          find release-bundles -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.xpi' -o -name '*.exe' \) -print0 | sort -z | xargs -0 sha256sum > release-bundles/SHA256SUMS.txt

      - name: Generate winget manifests
        shell: bash
        run: |
          set -euo pipefail

          package_identifier="D4AB.HardwareBridge"
          package_version="${GITHUB_REF_NAME#v}"
          installer_index="release-bundles/windows-installers-index.txt"

          if [[ ! -s "${installer_index}" ]]; then
            echo "No Windows installer index found for winget manifest generation."
            exit 1
          fi

          installers_yaml=""
          installer_type=""

          while IFS='|' read -r installer_arch detected_type installer_name; do
            [[ -z "${installer_arch}" || -z "${detected_type}" || -z "${installer_name}" ]] && continue

            if [[ "${installer_arch}" != "x64" && "${installer_arch}" != "arm64" ]]; then
              echo "Unsupported installer architecture for winget: ${installer_arch}"
              exit 1
            fi

            if [[ -z "${installer_type}" ]]; then
              installer_type="${detected_type}"
            elif [[ "${installer_type}" != "${detected_type}" ]]; then
              echo "Mixed Windows installer types detected (${installer_type} vs ${detected_type}); winget manifest requires one installer type."
              exit 1
            fi

            installer_file="release-bundles/${installer_name}"
            if [[ ! -f "${installer_file}" ]]; then
              echo "Indexed installer file not found: ${installer_file}"
              exit 1
            fi

            installer_sha="$(sha256sum "${installer_file}" | awk '{print toupper($1)}')"
            installer_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${installer_name}"

            installers_yaml+="  - Architecture: ${installer_arch}"$'\n'
            installers_yaml+="    InstallerUrl: ${installer_url}"$'\n'
            installers_yaml+="    InstallerSha256: ${installer_sha}"$'\n'
          done < "${installer_index}"

          if [[ -z "${installer_type}" || -z "${installers_yaml}" ]]; then
            echo "No valid Windows installers were found for winget manifest generation."
            exit 1
          fi

          mkdir -p release-bundles/winget

          cat > "release-bundles/winget/${package_identifier}.yaml" <<EOF
          PackageIdentifier: ${package_identifier}
          PackageVersion: ${package_version}
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.6.0
          EOF

          cat > "release-bundles/winget/${package_identifier}.locale.en-US.yaml" <<EOF
          PackageIdentifier: ${package_identifier}
          PackageVersion: ${package_version}
          PackageLocale: en-US
          Publisher: D4AB Project
          PackageName: D4AB Hardware Bridge
          License: MIT
          ShortDescription: Hardware access bridge for web applications.
          Homepage: https://github.com/${GITHUB_REPOSITORY}
          ReleaseNotesUrl: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}
          ManifestType: defaultLocale
          ManifestVersion: 1.6.0
          EOF

          cat > "release-bundles/winget/${package_identifier}.installer.yaml" <<EOF
          PackageIdentifier: ${package_identifier}
          PackageVersion: ${package_version}
          InstallerType: ${installer_type}
          InstallModes:
            - interactive
            - silent
            - silentWithProgress
          InstallerSwitches:
            Silent: /S
            SilentWithProgress: /S
          UpgradeBehavior: install
          Installers:
          EOF

          printf "%s" "${installers_yaml}" >> "release-bundles/winget/${package_identifier}.installer.yaml"

          cat >> "release-bundles/winget/${package_identifier}.installer.yaml" <<EOF
          ManifestType: installer
          ManifestVersion: 1.6.0
          EOF

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-bundles/*.tar.gz
            release-bundles/*.zip
            release-bundles/*.xpi
            release-bundles/*.exe
            release-bundles/SHA256SUMS.txt
            release-bundles/winget/*.yaml
          generate_release_notes: true
          fail_on_unmatched_files: true
