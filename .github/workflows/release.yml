name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18.x
          - 20.x
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CI-safe tests
        run: npm run test:ci

  frontend-tests:
    name: Frontend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18.x
          - 20.x
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CI-safe tests
        run: npm run test:ci

  build-platform-installers:
    name: Build Platform Installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Windows packaging toolchain
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: choco install nsis innosetup -y --no-progress

      - name: Build installer for host platform
        run: node installer/build_installer.js

      - name: Verify Windows installer binary
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path dist -Recurse -File |
            Where-Object { $_.Name -match '^d4ab-bridge-.*-windows-(installer|inno)\.exe$' } |
            Select-Object -First 1

          if (-not $installer) {
            throw 'No Windows installer executable was produced. Winget publish flow requires d4ab-bridge-<version>-windows-(installer|inno).exe.'
          }

          Write-Host "Found Windows installer: $($installer.FullName)"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error

  build-brew-artifacts:
    name: Build Homebrew Artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Build Homebrew artifacts
        run: node installer/build_installer.js --target brew

      - name: Upload Homebrew artifacts
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-${{ matrix.os }}
          path: dist/homebrew/**
          if-no-files-found: error

  build-extension-packages:
    name: Build Extension Packages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Package browser extensions
        run: npm run package:all

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extensions
          path: frontend/dist/extensions/*
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
      - build-platform-installers
      - build-brew-artifacts
      - build-extension-packages
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Bundle artifacts for release upload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-bundles

          bundle_count=0
          for artifact_dir in release-artifacts/*; do
            if [[ -d "${artifact_dir}" ]]; then
              bundle_name="$(basename "${artifact_dir}")"

              # Keep Windows installer payload as zip for native Windows tooling expectations.
              if [[ "${bundle_name}" == "installer-windows-latest" ]]; then
                if ! command -v zip >/dev/null 2>&1; then
                  echo "zip command is required to package Windows installer artifacts."
                  exit 1
                fi
                (
                  cd release-artifacts
                  zip -r "../release-bundles/${bundle_name}.zip" "${bundle_name}"
                )

                # Publish a direct installer binary for winget manifests.
                win_installer_path="$(find "${artifact_dir}" -type f -name '*-windows-installer.exe' | sort | head -n1 || true)"
                installer_type="nullsoft"

                if [[ -z "${win_installer_path}" ]]; then
                  win_installer_path="$(find "${artifact_dir}" -type f -name '*-windows-inno.exe' | sort | head -n1 || true)"
                  installer_type="inno"
                fi

                if [[ -z "${win_installer_path}" ]]; then
                  echo "No Windows installer executable was found in downloaded artifacts."
                  exit 1
                fi

                release_version="${GITHUB_REF_NAME#v}"
                release_installer_name="d4ab-bridge-${release_version}-windows-installer.exe"
                cp "${win_installer_path}" "release-bundles/${release_installer_name}"
                echo "${installer_type}" > release-bundles/windows-installer-type.txt
              elif [[ "${bundle_name}" == "extensions" ]]; then
                ext_count=0
                while IFS= read -r -d '' extension_file; do
                  cp "${extension_file}" release-bundles/
                  ext_count=$((ext_count + 1))
                done < <(find "${artifact_dir}" -maxdepth 1 -type f \( -name '*.zip' -o -name '*.xpi' \) -print0)

                if [[ "${ext_count}" -eq 0 ]]; then
                  echo "No extension package artifacts were found in ${bundle_name}."
                  exit 1
                fi
              else
                tar -czf "release-bundles/${bundle_name}.tar.gz" -C release-artifacts "${bundle_name}"
              fi

              bundle_count=$((bundle_count + 1))
            fi
          done

          if [[ "${bundle_count}" -eq 0 ]]; then
            echo "No artifact directories were downloaded; cannot create release bundles."
            exit 1
          fi

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          find release-bundles -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.xpi' -o -name '*.exe' \) -print0 | sort -z | xargs -0 sha256sum > release-bundles/SHA256SUMS.txt

      - name: Generate winget manifests
        shell: bash
        run: |
          set -euo pipefail

          package_identifier="D4AB.HardwareBridge"
          package_version="${GITHUB_REF_NAME#v}"
          installer_file="$(find release-bundles -maxdepth 1 -type f -name 'd4ab-bridge-*-windows-installer.exe' | head -n1 || true)"
          installer_type="$(cat release-bundles/windows-installer-type.txt 2>/dev/null || echo nullsoft)"

          if [[ -z "${installer_file}" ]]; then
            echo "No canonical Windows installer executable found for winget manifest generation."
            exit 1
          fi

          installer_name="$(basename "${installer_file}")"
          installer_sha="$(sha256sum "${installer_file}" | awk '{print toupper($1)}')"
          installer_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${installer_name}"

          mkdir -p release-bundles/winget

          cat > "release-bundles/winget/${package_identifier}.yaml" <<EOF
          PackageIdentifier: ${package_identifier}
          PackageVersion: ${package_version}
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.6.0
          EOF

          cat > "release-bundles/winget/${package_identifier}.locale.en-US.yaml" <<EOF
          PackageIdentifier: ${package_identifier}
          PackageVersion: ${package_version}
          PackageLocale: en-US
          Publisher: D4AB Project
          PackageName: D4AB Hardware Bridge
          License: MIT
          ShortDescription: Hardware access bridge for web applications.
          Homepage: https://github.com/${GITHUB_REPOSITORY}
          ReleaseNotesUrl: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}
          ManifestType: defaultLocale
          ManifestVersion: 1.6.0
          EOF

          cat > "release-bundles/winget/${package_identifier}.installer.yaml" <<EOF
          PackageIdentifier: ${package_identifier}
          PackageVersion: ${package_version}
          InstallerType: ${installer_type}
          InstallModes:
            - interactive
            - silent
            - silentWithProgress
          InstallerSwitches:
            Silent: /S
            SilentWithProgress: /S
          UpgradeBehavior: install
          Installers:
            - Architecture: x64
              InstallerUrl: ${installer_url}
              InstallerSha256: ${installer_sha}
          ManifestType: installer
          ManifestVersion: 1.6.0
          EOF

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-bundles/*.tar.gz
            release-bundles/*.zip
            release-bundles/*.xpi
            release-bundles/*.exe
            release-bundles/SHA256SUMS.txt
            release-bundles/winget/*.yaml
          generate_release_notes: true
          fail_on_unmatched_files: true
