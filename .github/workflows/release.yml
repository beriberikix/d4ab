name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18.x
          - 20.x
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CI-safe tests
        run: npm run test:ci

  frontend-tests:
    name: Frontend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18.x
          - 20.x
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CI-safe tests
        run: npm run test:ci

  build-platform-installers:
    name: Build Platform Installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Build installer for host platform
        run: node installer/build_installer.js

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error

  build-brew-artifacts:
    name: Build Homebrew Artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Build Homebrew artifacts
        run: node installer/build_installer.js --target brew

      - name: Upload Homebrew artifacts
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-${{ matrix.os }}
          path: dist/homebrew/**
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
      - build-platform-installers
      - build-brew-artifacts
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Bundle artifacts for release upload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-bundles

          bundle_count=0
          for artifact_dir in release-artifacts/*; do
            if [[ -d "${artifact_dir}" ]]; then
              bundle_name="$(basename "${artifact_dir}")"
              tar -czf "release-bundles/${bundle_name}.tar.gz" -C release-artifacts "${bundle_name}"
              bundle_count=$((bundle_count + 1))
            fi
          done

          if [[ "${bundle_count}" -eq 0 ]]; then
            echo "No artifact directories were downloaded; cannot create release bundles."
            exit 1
          fi

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          find release-bundles -type f -name '*.tar.gz' -print0 | sort -z | xargs -0 sha256sum > release-bundles/SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-bundles/*.tar.gz
            release-bundles/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
