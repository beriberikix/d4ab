name: CI Installers

on:
  pull_request:
    paths:
      - installer/**
      - backend/src/**
      - backend/package.json
      - backend/package-lock.json
      - frontend/src/**
      - frontend/manifest-chrome.json
      - frontend/manifest-firefox.json
      - frontend/package.json
      - frontend/package-lock.json
      - .github/workflows/ci-installers.yml
  push:
    branches:
      - main
    paths:
      - installer/**
      - backend/src/**
      - backend/package.json
      - backend/package-lock.json
      - frontend/src/**
      - frontend/manifest-chrome.json
      - frontend/manifest-firefox.json
      - frontend/package.json
      - frontend/package-lock.json
      - .github/workflows/ci-installers.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-platform-installers:
    name: Build Platform Installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Windows packaging toolchain
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: choco install nsis innosetup -y --no-progress

      - name: Build installer for host platform
        run: node installer/build_installer.js

      - name: Verify Windows installer binary
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path dist -Recurse -File |
            Where-Object { $_.Name -match '^d4ab-bridge-.*-windows-installer\.exe$' } |
            Select-Object -First 1

          if (-not $installer) {
            throw 'No NSIS Windows installer executable was produced. Winget publish flow expects d4ab-bridge-<version>-windows-installer.exe.'
          }

          Write-Host "Found Windows installer: $($installer.FullName)"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error

  build-brew-artifacts:
    name: Build Homebrew Artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Build Homebrew artifacts
        run: node installer/build_installer.js --target brew

      - name: Upload Homebrew artifacts
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-${{ matrix.os }}
          path: |
            dist/homebrew/**
          if-no-files-found: error
